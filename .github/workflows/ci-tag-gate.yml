name: CI Tag Gate

"on":
  push:
    tags:
      - "v*"

jobs:
  gate-on-tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run gate suite
        run: python tests/run_all.py --gate