name: Release

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-release-assets:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify release assets exist
        run: |
          test -f benchmarks/v4_dogfood_report_external.md
          test -f README.md
          test -f tests/TEST_MANIFEST.md
          test -f .contextcore/context_snapshot.md

  publish-release:
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            benchmarks/v4_dogfood_report_external.md
            README.md
            tests/TEST_MANIFEST.md
            .contextcore/context_snapshot.md